<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #0b0e14; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Container Principal que engloba tudo, conforme sua imagem */
        #main-container {
            width: 1400px; height: 800px; /* Tamanho do retângulo da sua imagem */
            background: #141a24;
            border: 2px solid #2d3748;
            border-radius: 20px;
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        #titulo { color: #00ffff; font-size: 40px; margin: 20px 0; text-transform: uppercase; font-weight: bold; }
        #status-bar { width: 90%; padding: 15px; color: #ffcc00; text-align: center; font-size: 25px; border: 2px solid #333; background: #000; margin-bottom: 20px; font-weight: bold; }
        
        /* O fundo azulado onde os cabos são montados */
        #work-area { 
            width: 95%; height: 500px; 
            background: url('ambiente.jpg') no-repeat center center; 
            background-size: contain; 
            position: relative; 
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .bolinha { width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; position: absolute; cursor: pointer; display: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="main-container">
        <h1 id="titulo">LABORATÓRIO SMT PRO</h1>
        <div id="status-bar">CONECTE A FASE: CLIQUE NA REFERÊNCIA DO DR</div>
        
        <div id="work-area">
            <canvas id="canvas" width="1400" height="500"></canvas>
            <div id="b1" class="bolinha"></div>
            <div id="b2" class="bolinha"></div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Função de animação que mantém os cabos (sem clearRect)
    function animar(pasta, total) {
        let f = 1;
        let intv = setInterval(() => {
            let img = new Image();
            img.src = `${pasta}/quadro${f.toString().padStart(4, '0')}.png`;
            img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); };
            if (++f > total) clearInterval(intv);
        }, 50);
    }
</script>
</body>
</html>
