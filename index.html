<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; 
        }

        /* Contêiner pai que força a escala e centraliza */
        #game-wrapper {
            width: 1920px;
            height: 1080px;
            transform-origin: center;
            transform: scale(calc(min(90vw / 1920, 80vh / 1080)));
            position: relative;
            /* Flexbox para empilhar o conteúdo conforme a imagem */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Posicionamento baseado na sua imagem */
        #titulo-header { 
            margin-top: 50px; 
            margin-bottom: 30px;
            color: #00ffff; 
            font-size: 60px; 
            text-transform: uppercase;
        }

        #status-bar { 
            width: 1400px; /* Largura proporcional à caixa na imagem */
            padding: 30px; 
            margin-bottom: 40px;
            color: #ffcc00; 
            text-align: center; 
            font-size: 35px; 
            border: 2px solid #333; 
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
        }

        #game-container { 
            width: 1400px; 
            height: 700px; 
            background: #2c7a7a; /* Cor de fundo da área do jogo */
            border-radius: 15px;
            position: relative;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <h1 id="titulo-header">LABORATÓRIO SMT PRO</h1>
        
        <div id="status-bar">CONECTE A FASE: CLIQUE NA REFERÊNCIA DO DR</div>

        <div id="game-container">
            </div>
    </div>

</body>
</html>
