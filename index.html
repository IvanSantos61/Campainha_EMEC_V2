<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Pro - Simulador de Cablagem</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background-color: #06080a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 1. TÍTULO - Fora do quadro */
        #titulo-projeto {
            color: #00FFFF;
            font-size: clamp(24px, 5vw, 48px);
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            text-align: center;
        }

        /* 2. LINHA DE STATUS - Fora do quadro */
        #linha-status {
            background: rgba(15, 25, 35, 0.9);
            border: 1px solid #1a3a5a;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .texto-status {
            color: #FFD700;
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 3. QUADRO PRINCIPAL DE EQUIPAMENTOS */
        #quadro-simulacao {
            position: relative;
            width: 100%;
            max-width: 1600px; /* Limite de conforto visual */
            aspect-ratio: 1920 / 1080; /* TRAVA A PROPORÇÃO SEM TRAVAR O ZOOM */
            background-color: #000;
            border: 2px solid #333;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .camada {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .oculto { display: none; }

        /* INTERAÇÃO: BOLINHAS DINÂMICAS */
        .ponto {
            position: absolute;
            width: 1.8%; /* Tamanho relativo ao quadro */
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: transform 0.2s;
        }
        .ponto:hover { transform: translate(-50%, -50%) scale(1.2); }

        /* Cores iniciais por tipo de cabo */
        .fase { background-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .neutro { background-color: #0066ff; box-shadow: 0 0 15px #0066ff; }
        .retorno { background-color: #ffffff; box-shadow: 0 0 10px #ffffff; }
        
        /* Estado de sucesso (Verde) */
        .sucesso { background-color: #00ff00 !important; box-shadow: 0 0 20px #00ff00 !important; }

        /* Botão Reiniciar */
        #btn-reset {
            margin-top: 30px;
            background: linear-gradient(180deg, #d10000, #8b0000);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: filter 0.2s;
        }
        #btn-reset:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <h1 id="titulo-projeto">LABORATÓRIO SMT PRO</h1>

    <div id="linha-status">
        <span id="label-status" class="texto-status">A CARREGAR SISTEMA...</span>
    </div>

    <main id="quadro-simulacao">
        <img src="ambiente.jpg" class="camada" alt="Quadro">

        <img id="img-fase-rede" class="camada oculto">
        <img id="img-neutro-rede" class="camada oculto">
        <img id="img-fase-circuito" class="camada oculto">
        <img id="img-retorno" class="camada oculto">
        <img id="img-neutro-circuito" class="camada oculto">

        <div id="interacao-container"></div>
    </main>

    <button id="btn-reset" onclick="location.reload()">REINICIAR LABORATÓRIO</button>

    <script>
        /**
         * CONFIGURAÇÃO DOS 5 CABOS
         * Coordenadas em % para manter a precisão em qualquer tamanho de ecrã.
         */
        const roteiro = [
            { 
                id: "fase_rede", nome: "Fase de Entrada", pasta: "FASE_REDE", total: 64, imgId: "img-fase-rede", cor: "fase",
                origem: { x: 28.5, y: 39.2 }, destino: { x: 28.5, y: 52.5 }
            },
            { 
                id: "neutro_rede", nome: "Neutro de Entrada", pasta: "NEUTRO_REDE", total: 76, imgId: "img-neutro-rede", cor: "neutro",
                origem: { x: 31.2, y: 39.2 }, destino: { x: 31.2, y: 52.5 }
            },
            { 
                id: "fase_2", nome: "Fase do Circuito", pasta: "FASE_2", total: 25, imgId: "img-fase-circuito", cor: "fase",
                origem: { x: 35.0, y: 58.0 }, destino: { x: 60.5, y: 71.0 }
            },
            { 
                id: "retorno", nome: "Retorno da Lâmpada", pasta: "RETORNO", total: 45, imgId: "img-retorno", cor: "retorno",
                origem: { x: 62.0, y: 71.0 }, destino: { x: 74.5, y: 64.5 }
            },
            { 
                id: "neutro_2", nome: "Neutro da Lâmpada", pasta: "NEUTRO_2", total: 15, imgId: "img-neutro-circuito", cor: "neutro",
                origem: { x: 76.5, y: 64.5 }, destino: { x: 32.5, y: 58.0 }
            }
        ];

        let etapaAtual = 0;
        const labelStatus = document.getElementById('label-status');
        const containerInteracao = document.getElementById('interacao-container');

        function atualizarLaboratorio() {
            if (etapaAtual >= roteiro.length) {
                labelStatus.innerText = "CIRCUITO MONTADO E TESTADO COM SUCESSO!";
                return;
            }

            const dados = roteiro[etapaAtual];
            labelStatus.innerText = `LIGUE O CABO: ${dados.nome.toUpperCase()}`;

            // 1. Cria bolinha de ORIGEM na cor do cabo
            criarCheckpoint(dados.origem, dados.cor, function() {
                this.classList.add('sucesso'); // Fica verde
                
                // 2. Cria bolinha de DESTINO na cor do cabo
                criarCheckpoint(dados.destino, dados.cor, function() {
                    containerInteracao.innerHTML = ""; // Limpa pontos
                    dispararAnimacao(dados);
                });
            });
        }

        function criarCheckpoint(pos, corClasse, aoClicar) {
            const ponto = document.createElement('div');
            ponto.className = `ponto ${corClasse}`;
            ponto.style.left = pos.x + "%";
            ponto.style.top = pos.y + "%";
            ponto.onclick = (e) => {
                e.stopPropagation();
                aoClicar.call(ponto);
            };
            containerInteracao.appendChild(ponto);
        }

        function dispararAnimacao(dados) {
            const imgElement = document.getElementById(dados.imgId);
            imgElement.classList.remove('oculto');
            let frame = 1;

            function animar() {
                if (frame <= dados.total) {
                    const sufixo = String(frame).padStart(4, '0');
                    imgElement.src = `${dados.pasta}/quadro${sufixo}.png`;
                    frame++;
                    requestAnimationFrame(animar);
                } else {
                    etapaAtual++;
                    setTimeout(atualizarLaboratorio, 400);
                }
            }
            requestAnimationFrame(animar);
        }

        // Início
        window.onload = atualizarLaboratorio;
    </script>
</body>
</html>
