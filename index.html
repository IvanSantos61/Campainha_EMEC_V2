<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT Pro</title>
    <style>
        /* CSS original mantido integralmente */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #05070a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        #quadro-simulacao { position: relative; width: 100%; max-width: 1600px; aspect-ratio: 1920 / 1080; background-color: #000; border: 2px solid #333; overflow: hidden; }
        .camada { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .ponto { position: absolute; width: 1.8%; aspect-ratio: 1/1; border-radius: 50%; border: 2px solid #fff; cursor: pointer; z-index: 100; transform: translate(-50%, -50%); }
        .sucesso { background-color: #00ff00 !important; }
        .oculto { display: none !important; }

        /* Balões Informativos */
        .balao-info { position: absolute; width: 30px; height: 30px; background: #00f2ff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: help; z-index: 900; }
        .balao-info::after { content: attr(data-msg); visibility: hidden; position: absolute; top: 35px; left: 0; width: 250px; background: #fff; color: #000; padding: 10px; border-radius: 5px; font-size: 12px; z-index: 999; }
        .balao-info:hover::after { visibility: visible; }

        /* Placa e Scanner */
        #placa-concluido { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #001100; border: 3px solid #00ff00; padding: 40px; color: #00ff00; z-index: 2000; font-weight: bold; text-transform: uppercase; }
        #placa-concluido::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #00ff00; animation: scanner 2s linear infinite; }
        @keyframes scanner { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <main id="quadro-simulacao">
        <div id="balao-0" class="balao-info oculto" style="top: 20%; left: 30%;" data-msg="A fase pode ser de qualquer cor (Item 6.1.5.3.4 da NBR-5410)">i</div>
        <div id="balao-1" class="balao-info oculto" style="top: 20%; left: 40%;" data-msg="A seção mínima dos fios de iluminação é 1,5mm² (Item 6.2.6.1.1 da NBR-5410)">i</div>
        <div id="balao-2" class="balao-info oculto" style="top: 20%; left: 50%;" data-msg="Conectores garantem conexões firmes">i</div>
        <div id="balao-3" class="balao-info oculto" style="top: 20%; left: 60%;" data-msg="O interruptor deve seccionar o condutor fase">i</div>
        <div id="balao-4" class="balao-info oculto" style="top: 20%; left: 70%;" data-msg="O retorno pode ser de qualquer cor">i</div>

        <img src="ambiente.jpg" class="camada">
        <img id="img-fase-rede" class="camada oculto">
        <img id="img-neutro-rede" class="camada oculto">
        <img id="img-fase-circuito" class="camada oculto">
        <img id="img-retorno" class="camada oculto">
        <img id="img-neutro-circuito" class="camada oculto">
        <div id="placa-concluido" class="oculto">INSTALAÇÃO CONCLUÍDA</div>
        <div id="interacao-container"></div>
    </main>

    <script>
        const roteiro = [
            { pasta: "FASE_REDE", total: 64, imgId: "img-fase-rede", origem: {x: 27, y: 38.5}, destino: {x: 98.5, y: 17.5} },
            { pasta: "NEUTRO_REDE", total: 76, imgId: "img-neutro-rede", origem: {x: 44.3, y: 35.2}, destino: {x: 98.5, y: 14} },
            { pasta: "FASE_2", total: 25, imgId: "img-fase-circuito", origem: {x: 75, y: 19}, destino: {x: 73.5, y: 71.0} },
            { pasta: "RETORNO", total: 45, imgId: "img-retorno", origem: {x: 73, y: 76.5}, destino: {x: 88.5, y: 59.5} },
            { pasta: "NEUTRO_2", total: 15, imgId: "img-neutro-circuito", origem: {x: 92.5, y: 15.8}, destino: {x: 90.2, y: 59.5} }
        ];

        let etapaAtual = 0;

        function proximoPasso() {
            if (etapaAtual >= roteiro.length) {
                document.getElementById('placa-concluido').classList.remove('oculto');
                return;
            }
            const dados = roteiro[etapaAtual];
            criarPonto(dados.origem, () => {
                criarPonto(dados.destino, () => {
                    executarAnimacaoFluida(dados);
                });
            });
        }

        function executarAnimacaoFluida(dados) {
            const img = document.getElementById(dados.imgId);
            img.classList.remove('oculto');
            let f = 1;
            const anim = setInterval(() => {
                if (f > dados.total) {
                    clearInterval(anim);
                    document.getElementById('balao-' + etapaAtual).classList.remove('oculto');
                    etapaAtual++;
                    proximoPasso();
                } else {
                    img.src = `${dados.pasta}/quadro${String(f).padStart(4, '0')}.png`;
                    f++;
                }
            }, 30);
        }

        function criarPonto(pos, fn) {
            const p = document.createElement('div');
            p.className = 'ponto';
            p.style.left = pos.x + "%"; p.style.top = pos.y + "%";
            p.onclick = () => { p.classList.add('sucesso'); fn(); };
            document.getElementById('interacao-container').appendChild(p);
        }

        window.onload = proximoPasso;
    </script>
</body>
</html>
