<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT Pro</title>
    <style>
        /* CSS mantido para garantir o layout */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #quadro-simulacao { position: relative; width: 1000px; height: 562px; background: #111; overflow: hidden; }
        .camada { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .ponto { position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; cursor: pointer; z-index: 100; }
        .oculto { display: none !important; }
        
        /* Estilo dos Balões 'i' */
        .balao-info { position: absolute; width: 30px; height: 30px; background: #00f2ff; color: #000; border-radius: 50%; text-align: center; line-height: 30px; font-weight: bold; cursor: help; z-index: 900; }
        .balao-info::after { content: attr(data-msg); visibility: hidden; position: absolute; top: 35px; left: 0; width: 250px; background: #fff; color: #000; padding: 10px; border-radius: 5px; font-size: 12px; pointer-events: none; }
        .balao-info:hover::after { visibility: visible; }
    </style>
</head>
<body>
    <main id="quadro-simulacao">
        <div id="balao-fase-rede" class="balao-info oculto" style="top: 100px; left: 200px;" data-msg="A fase pode ser de qualquer cor (Item 6.1.5.3.4 da NBR-5410)">i</div>
        <div id="balao-neutro-rede" class="balao-info oculto" style="top: 100px; left: 300px;" data-msg="A seção mínima dos fios de iluminação é 1,5mm² (Item 6.2.6.1.1 da NBR-5410)">i</div>
        <div id="balao-fase-2" class="balao-info oculto" style="top: 100px; left: 400px;" data-msg="O interruptor deve seccionar o condutor fase (Item 6.3.7.2.1 da NBR-5410)">i</div>
        <div id="balao-retorno" class="balao-info oculto" style="top: 100px; left: 500px;" data-msg="O retorno também poderá ser de qualquer cor (Continuidade da fase NBR-5410)">i</div>
        <div id="balao-neutro-2" class="balao-info oculto" style="top: 100px; left: 600px;" data-msg="O interruptor recebe fase e retorno e a campainha recebe retorno e neutro">i</div>

        <img src="ambiente.jpg" class="camada">
        <div id="interacao-container"></div>
        <img id="img-fase-rede" class="camada oculto">
        <img id="img-neutro-rede" class="camada oculto">
        <img id="img-fase-circuito" class="camada oculto">
        <img id="img-retorno" class="camada oculto">
        <img id="img-neutro-circuito" class="camada oculto">
    </main>

    <script>
        const roteiro = [
            { id: "fase-rede", origem: {x: 200, y: 200}, destino: {x: 500, y: 200} },
            { id: "neutro-rede", origem: {x: 200, y: 300}, destino: {x: 500, y: 300} },
            { id: "fase-2", origem: {x: 200, y: 400}, destino: {x: 500, y: 400} },
            { id: "retorno", origem: {x: 600, y: 200}, destino: {x: 800, y: 200} },
            { id: "neutro-2", origem: {x: 600, y: 300}, destino: {x: 800, y: 300} }
        ];

        let etapa = 0;

        function proximoPasso() {
            if (etapa >= roteiro.length) return;
            const passo = roteiro[etapa];
            criarPonto(passo.origem, () => {
                criarPonto(passo.destino, () => {
                    // Finalizou a etapa, mostra o balão correspondente
                    const balao = document.getElementById('balao-' + passo.id);
                    if (balao) balao.classList.remove('oculto');
                    etapa++;
                    proximoPasso();
                });
            });
        }

        function criarPonto(pos, callback) {
            const p = document.createElement('div');
            p.className = 'ponto';
            p.style.left = pos.x + 'px'; p.style.top = pos.y + 'px';
            p.onclick = () => { p.remove(); callback(); };
            document.getElementById('interacao-container').appendChild(p);
        }

        window.onload = proximoPasso;
    </script>
</body>
</html>
